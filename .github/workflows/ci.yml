# FLOW-015 | Pipeline CI/CD
#
# Fluxo:
#   - PR para main/staging  -> build + testes (gate de merge)
#   - push para main/staging -> build + testes
#
# Deploy de producao roda em workflow separado (fly-deploy.yml), via Fly.io.
name: CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

# Cancela execucoes antigas do mesmo ref quando chega um push novo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Testes usam H2 em memoria (src/test/resources/application.properties),
      # entao nao e preciso subir banco no CI.
      - name: Build & test
        run: ./mvnw -B clean verify
