# Render Blueprint (FLOW-014)
# Docs: https://render.com/docs/blueprint-spec
#
# Sobe a API FlowFuel + PostgreSQL gerenciado a partir do Dockerfile da raiz.
# Secrets (sync: false) sao preenchidos no painel do Render; nunca versionados.
databases:
  - name: flowfuel-db
    databaseName: flowfuel
    user: flowfuel
    plan: free
    # Mantem o banco acessivel apenas pela rede interna do Render.
    ipAllowList: []

services:
  - type: web
    name: flowfuel-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    # Render injeta a env var PORT; o app a le em server.port=${PORT:8090}.
    healthCheckPath: /actuator/health
    # autoDeploy desligado (FLOW-015): o deploy de producao e disparado pelo
    # GitHub Actions via Deploy Hook, somente apos a aprovacao manual no
    # environment "production". Assim o gate de aprovacao nao e contornado.
    autoDeploy: false
    branch: main
    # Build filter: so dispara build quando muda codigo/infra relevante,
    # ignorando alteracoes de documentacao. Para staging, o deploy ocorre
    # via Preview Environments / branch staging no painel do Render.
    buildFilter:
      paths:
        - src/**
        - pom.xml
        - Dockerfile
        - render.yaml
      ignoredPaths:
        - "**/*.md"
        - Claude/**
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # --- Banco de dados (preenchido automaticamente pelo Render) ---
      # SPRING_DATASOURCE_URL precisa do formato JDBC com ?sslmode=require,
      # que o Render nao gera (ele expoe postgres://). Por isso e sync: false:
      # cole jdbc:postgresql://<internal-host>:5432/flowfuel?sslmode=require
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: flowfuel-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: flowfuel-db
          property: password

      # Pool HikariCP (FLOW-011) — ajuste conforme limite do plano do banco.
      - key: DB_POOL_MAX
        value: "10"
      - key: DB_POOL_MIN
        value: "2"

      # --- Segredos (preencher no painel; nunca commitar) ---
      # JWT_SECRET e OBRIGATORIO: sem ele o app nao sobe (JwtProdValidator).
      - key: JWT_SECRET
        sync: false

      # --- Email de ativacao de conta (SendGrid via SMTP) ---
      # Liga o SmtpAccountActivationNotifier. Enquanto MAIL_ENABLED!=true o link
      # so vai para o log (LoggingAccountActivationNotifier) — nao use assim em prod.
      - key: MAIL_ENABLED
        value: "true"
      - key: MAIL_HOST
        value: smtp.sendgrid.net
      - key: MAIL_PORT
        value: "587"
      # SendGrid: o username e literalmente a string "apikey"; a senha e a API key.
      - key: MAIL_USERNAME
        value: apikey
      - key: MAIL_PASSWORD
        sync: false
      # Remetente: precisa ser um Single Sender ou dominio verificado no SendGrid.
      - key: MAIL_FROM
        value: no-reply@flowfuel.app
      # Base do link de ativacao (rota do frontend que consome o token).
      - key: ACCOUNT_ACTIVATION_LINK_BASE_URL
        sync: false

      # Observabilidade (ADR-008) — opcionais; sem DSN o Sentry fica off.
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: prod
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"

      # Swagger desligado em prod por padrao (FLOW-007).
      - key: SWAGGER_ENABLED
        value: "false"
