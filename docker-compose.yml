# Ambiente "prod" local para testes: PostgreSQL gerenciado + API FlowFuel.
# Sobe a mesma imagem do Dockerfile com SPRING_PROFILES_ACTIVE=prod, exercitando
# Flyway, HikariCP e o datasource Postgres — igual ao Render, mas na sua maquina.
#
# Uso:
#   cp .env.prod.example .env.prod   # e ajuste se quiser
#   docker compose --env-file .env.prod up --build
#
# A URL usa sslmode=disable porque o Postgres local nao tem TLS. Em producao
# (Render) a SPRING_DATASOURCE_URL usa ?sslmode=require.

services:
  db:
    image: postgres:16-alpine
    container_name: flowfuel-db
    environment:
      POSTGRES_DB: flowfuel
      POSTGRES_USER: flowfuel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowfuel}
    ports:
      - "5432:5432"
    volumes:
      - flowfuel-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowfuel -d flowfuel"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    image: flowfuel:prod
    container_name: flowfuel-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: 10000
      # Postgres do compose; sslmode=disable porque nao ha TLS local.
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/flowfuel?sslmode=disable
      SPRING_DATASOURCE_USERNAME: flowfuel
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-flowfuel}
      # OBRIGATORIO em prod (fail-fast). Defina em .env.prod.
      JWT_SECRET: ${JWT_SECRET}
      # CORS para front local (ajuste conforme necessario).
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8081}
      # Swagger ligado para facilitar os testes manuais (off por padrao em prod).
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      # Storage B2 opcional: sem credenciais o app sobe, mas upload de foto falha.
      B2_S3_ENDPOINT: ${B2_S3_ENDPOINT:-}
      B2_S3_REGION: ${B2_S3_REGION:-us-west-002}
      B2_S3_ACCESS_KEY: ${B2_S3_ACCESS_KEY:-}
      B2_S3_SECRET: ${B2_S3_SECRET:-}
      B2_BUCKET_NAME: ${B2_BUCKET_NAME:-}
    ports:
      - "10000:10000"

volumes:
  flowfuel-pgdata:
