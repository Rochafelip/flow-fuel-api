spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
# Flyway desligado nos testes: schema H2 e gerado pelo Hibernate a partir das
# entidades JPA (ddl-auto=create-drop acima). Sem isso, este arquivo shadowa
# completamente src/main/resources/application.properties no classpath de
# teste (Spring Boot nao faz merge de application.properties duplicado), entao
# spring.flyway.enabled=false de la nao se aplica e Flyway roda com o default
# (enabled=true) contra H2 — quebrando com sintaxe especifica de Postgres
# (ex.: indices parciais com WHERE) presente nas migrations reais.
spring.flyway.enabled=false
jwt.secret=test-secret-key-for-unit-tests-only-32chars!!
flowfuel.refresh-token.cleanup.enabled=false
flowfuel.password-reset.cleanup.enabled=false
flowfuel.account-activation.cleanup.enabled=false
# Rate limiting desligado por padrao nos testes: todos compartilham 127.0.0.1 e
# excederiam os limites. RateLimitFilterIntegrationTest religa via @TestPropertySource.
flowfuel.rate-limit.enabled=false
# Sem envio de email nos testes: token de reset volta no corpo da resposta.
flowfuel.password-reset.expose-token=true
# Idem ativacao: token devolvido no resend-activation para os testes ativarem contas.
flowfuel.account-activation.expose-token=true