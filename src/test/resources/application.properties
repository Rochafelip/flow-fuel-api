spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
jwt.secret=test-secret-key-for-unit-tests-only-32chars!!
flowfuel.refresh-token.cleanup.enabled=false
flowfuel.password-reset.cleanup.enabled=false
# Rate limiting desligado por padrao nos testes: todos compartilham 127.0.0.1 e
# excederiam os limites. RateLimitFilterIntegrationTest religa via @TestPropertySource.
flowfuel.rate-limit.enabled=false
# Sem envio de email nos testes: token de reset volta no corpo da resposta.
flowfuel.password-reset.expose-token=true