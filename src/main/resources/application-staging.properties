# Perfil staging: PostgreSQL via env vars + Flyway. Hibernate apenas valida o schema.
# Padrao Spring Boot SPRING_DATASOURCE_* (relaxed binding). O Render expoe
# DATABASE_URL no formato postgres://user:pass@host/db, que o driver JDBC nao
# aceita; por isso configuramos SPRING_DATASOURCE_URL no formato JDBC explicito:
#   SPRING_DATASOURCE_URL=jdbc:postgresql://host:5432/flowfuel?sslmode=require
# A URL DEVE incluir ?sslmode=require para forcar TLS na conexao.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Chave JWT — OBRIGATORIA em staging. Sem fallback: se JWT_SECRET nao estiver
# definida no ambiente, a aplicacao NAO sobe (fail-fast em JwtProdValidator).
# Nunca usar o segredo default de dev aqui — permitiria forja de tokens.
jwt.secret=${JWT_SECRET}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

spring.h2.console.enabled=false

# Swagger/OpenAPI (FLOW-007). Habilitado em staging para validar a API antes do
# deploy de producao, onde fica desligado por padrao.
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

# Sentry (ADR-008). Sem DSN, o SDK fica off — nao quebra o deploy.
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:staging}
sentry.release=${SENTRY_RELEASE:}
sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:1.0}
sentry.send-default-pii=false
sentry.logging.minimum-event-level=error
sentry.logging.minimum-breadcrumb-level=info

# Actuator (FLOW-005). O Render usa /actuator/health como health check para saber
# se o app esta vivo. Expoe apenas o endpoint health; liveness/readiness probes
# habilitados; nunca expor detalhes (evita vazar status de dependencias).
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# Email de ativacao de conta. Para enviar emails reais, defina no ambiente:
#   MAIL_ENABLED=true  MAIL_HOST=<smtp>  MAIL_PORT=587  MAIL_USERNAME=...  MAIL_PASSWORD=...
#   MAIL_FROM=no-reply@flowfuel.app  ACCOUNT_ACTIVATION_LINK_BASE_URL=https://<frontend>/activate
# Enquanto MAIL_ENABLED nao for true, o link de ativacao apenas vai para o log
# (LoggingAccountActivationNotifier).
flowfuel.mail.enabled=${MAIL_ENABLED:false}
