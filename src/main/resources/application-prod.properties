# Perfil prod: PostgreSQL via env vars + Flyway. Hibernate apenas valida o schema.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

spring.h2.console.enabled=false

# Sentry (ADR-008). Sem DSN, o SDK fica off — nao quebra o deploy.
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:prod}
sentry.release=${SENTRY_RELEASE:}
sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:0.1}
sentry.send-default-pii=false
sentry.logging.minimum-event-level=error
sentry.logging.minimum-breadcrumb-level=info
