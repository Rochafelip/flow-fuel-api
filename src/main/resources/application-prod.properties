# Perfil prod: PostgreSQL via env vars + Flyway. Hibernate apenas valida o schema.
# Padrao Spring Boot SPRING_DATASOURCE_* (relaxed binding). O Render expoe
# DATABASE_URL no formato postgres://user:pass@host/db, que o driver JDBC nao
# aceita; por isso configuramos SPRING_DATASOURCE_URL no formato JDBC explicito:
#   SPRING_DATASOURCE_URL=jdbc:postgresql://host:5432/flowfuel?sslmode=require
# A URL DEVE incluir ?sslmode=require para forcar TLS na conexao.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexoes HikariCP (FLOW-011). Tamanho do pool ajustavel via env vars
# para acomodar os limites de conexao do plano do banco (Render free/paid).
# connection-timeout: tempo max esperando uma conexao livre antes de falhar.
# max-lifetime: recicla conexoes antes do timeout do servidor PostgreSQL.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Chave JWT — OBRIGATORIA em producao. Sem fallback: se JWT_SECRET nao estiver
# definida no ambiente, a aplicacao NAO sobe (fail-fast em JwtProdValidator).
# Nunca usar o segredo default de dev aqui — permitiria forja de tokens.
jwt.secret=${JWT_SECRET}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

spring.h2.console.enabled=false

# Swagger/OpenAPI (FLOW-007). Desligado por padrao em producao para nao expor a
# superficie da API. Pode ser reativado pontualmente via SWAGGER_ENABLED=true.
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# Sentry (ADR-008). Sem DSN, o SDK fica off — nao quebra o deploy.
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:prod}
sentry.release=${SENTRY_RELEASE:}
sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:0.1}
sentry.send-default-pii=false
sentry.logging.minimum-event-level=error
sentry.logging.minimum-breadcrumb-level=info

# Actuator (FLOW-005). O Render usa /actuator/health como health check para saber
# se o app esta vivo. Expoe apenas o endpoint health; liveness/readiness probes
# habilitados; nunca expor detalhes (evita vazar status de dependencias).
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
