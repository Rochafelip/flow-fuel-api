# Perfil dev: H2 em memoria, schema gerado pelo Hibernate, Flyway desativado.
spring.datasource.url=jdbc:h2:mem:flowfuel
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.flyway.enabled=false

logging.level.org.hibernate.SQL=DEBUG

# Sentry desligado em dev (sem DSN).
sentry.dsn=

# Em dev nao ha envio de email: o token de reset volta no corpo da resposta
# e tambem e logado pelo LoggingPasswordResetNotifier. NUNCA habilitar em prod.
flowfuel.password-reset.expose-token=true

# Idem para ativacao de conta: link logado pelo LoggingAccountActivationNotifier
# e token devolvido no resend-activation. NUNCA habilitar em prod.
flowfuel.account-activation.expose-token=true
