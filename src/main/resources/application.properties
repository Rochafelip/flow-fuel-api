spring.application.name=FlowFuel

# Perfil padrao: dev (H2 + ddl-auto, Flyway desativado). Em producao use --spring.profiles.active=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Permitir acesso externo
server.address=0.0.0.0
server.port=${PORT:8090}

# Atras do proxy TLS do Render: confiar nos headers X-Forwarded-* para que o app
# reconheca o esquema HTTPS original (URLs geradas, redirects e cookies Secure corretos).
server.forward-headers-strategy=framework

# Flyway desligado por padrao; cada perfil decide ativar
spring.flyway.enabled=false

# Swagger / SpringDoc OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs

# Chave JWT — OBRIGATORIA em todos os perfis (incluindo dev). Sem fallback: se
# JWT_SECRET nao estiver definida no ambiente, a aplicacao NAO sobe (erro de
# placeholder nao resolvido do Spring). Minimo 32 caracteres para HS256/HS512.
# Gere um valor local com: openssl rand -base64 32
jwt.secret=${JWT_SECRET}

# JWT TTLs (ADR-003). Access curto (15min), refresh longo (30d) e rotacionavel.
jwt.access-token-ttl-ms=${JWT_ACCESS_TOKEN_TTL_MS:900000}
jwt.refresh-token-ttl-ms=${JWT_REFRESH_TOKEN_TTL_MS:2592000000}

# Cleanup de refresh tokens (ADR-003). Roda diariamente as 3h por padrao.
# retention-days = janela em que tokens revogados/expirados sao mantidos
# (para deteccao de re-uso e auditoria) antes de serem removidos.
flowfuel.refresh-token.cleanup.enabled=${REFRESH_TOKEN_CLEANUP_ENABLED:true}
flowfuel.refresh-token.cleanup.cron=${REFRESH_TOKEN_CLEANUP_CRON:0 0 3 * * *}
flowfuel.refresh-token.cleanup.retention-days=${REFRESH_TOKEN_RETENTION_DAYS:30}

# Redefinicao de senha ("esqueci minha senha"). Token opaco, hash SHA-256, uso unico.
# token-ttl-minutes = validade do token de reset.
# expose-token = devolve o token no corpo da resposta (apenas dev/stub de email);
#   NUNCA habilitar em producao — exporia o token a quem solicita o reset.
flowfuel.password-reset.token-ttl-minutes=${PASSWORD_RESET_TOKEN_TTL_MINUTES:30}
flowfuel.password-reset.expose-token=${PASSWORD_RESET_EXPOSE_TOKEN:false}
flowfuel.password-reset.cleanup.enabled=${PASSWORD_RESET_CLEANUP_ENABLED:true}
flowfuel.password-reset.cleanup.cron=${PASSWORD_RESET_CLEANUP_CRON:0 30 3 * * *}
flowfuel.password-reset.cleanup.retention-days=${PASSWORD_RESET_RETENTION_DAYS:7}

# Ativacao de conta (confirmacao de email). Token opaco, hash SHA-256, uso unico.
# token-ttl-minutes = validade do link de ativacao (1h por padrao).
# expose-token = devolve o token no corpo da resposta de resend-activation
#   (apenas dev/testes); NUNCA habilitar em producao.
# link-base-url = base do link de ativacao montado no email (frontend).
flowfuel.account-activation.token-ttl-minutes=${ACCOUNT_ACTIVATION_TOKEN_TTL_MINUTES:60}
flowfuel.account-activation.expose-token=${ACCOUNT_ACTIVATION_EXPOSE_TOKEN:false}
flowfuel.account-activation.link-base-url=${ACCOUNT_ACTIVATION_LINK_BASE_URL:http://localhost:5173/activate}
flowfuel.account-activation.cleanup.enabled=${ACCOUNT_ACTIVATION_CLEANUP_ENABLED:true}
flowfuel.account-activation.cleanup.cron=${ACCOUNT_ACTIVATION_CLEANUP_CRON:0 45 3 * * *}
flowfuel.account-activation.cleanup.retention-days=${ACCOUNT_ACTIVATION_RETENTION_DAYS:7}

# Envio de email (SMTP / JavaMailSender). Desligado por padrao: sem flowfuel.mail.enabled=true
# o LoggingAccountActivationNotifier (stub) apenas loga o link. Em prod/staging
# ligue flowfuel.mail.enabled=true e configure spring.mail.* via env vars.
flowfuel.mail.enabled=${MAIL_ENABLED:false}
flowfuel.mail.from=${MAIL_FROM:no-reply@flowfuel.app}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# Push notifications (Firebase Cloud Messaging). Desligado por padrao: sem
# envio real, PushNotificationService cai no stub de log
# (LoggingPushNotificationService). Para ligar, defina flowfuel.push.enabled=true
# e as credenciais da service account do Firebase por um dos dois meios:
# - credentials-file: caminho local para o JSON (uso em dev)
# - credentials-json: conteudo do JSON inline (uso em prod, sem arquivo persistente)
# Se ambos estiverem setados, credentials-json tem prioridade.
flowfuel.push.enabled=${PUSH_ENABLED:false}
flowfuel.push.credentials-file=${PUSH_CREDENTIALS_FILE:}
flowfuel.push.credentials-json=${PUSH_CREDENTIALS_JSON:}

# CORS — em prod, defina via env var APP_CORS_ALLOWED_ORIGINS (lista separada por vírgula).
# Combinar "*" com allow-credentials=true é inválido (Spring lança erro na inicialização).
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8081,http://192.168.1.2:8081,http://localhost:5173}
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# Rate limiting (FLOW-009): token bucket por IP nos endpoints de autenticacao.
# login 5/min, forgot-password 3/h, register 10/h. Resposta 429 + Retry-After.
flowfuel.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
flowfuel.rate-limit.redis-url=${REDIS_URL:redis://localhost:6379}

# Postos proximos (GET /api/v1/stations/nearby): Overpass API (OSM, sem key)
# e Open Charge Map (sem key obrigatoria; com key aumenta o rate limit).
# Gere uma key gratuita em openchargemap.org se necessario e configure via
# env var OPEN_CHARGE_MAP_API_KEY (opcional, app sobe normalmente sem ela).
flowfuel.station.overpass.base-url=${OVERPASS_BASE_URL:https://overpass-api.de/api/interpreter}
flowfuel.station.open-charge-map.base-url=${OPEN_CHARGE_MAP_BASE_URL:https://api.openchargemap.io/v3/poi}
flowfuel.station.open-charge-map.api-key=${OPEN_CHARGE_MAP_API_KEY:}

# Paginação: limite máximo de itens por página (defesa contra size=10000)
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.default-page-size=20

# Limites de upload (multipart). Sobrescreva via env vars MAX_FILE_SIZE e MAX_REQUEST_SIZE.
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}
