# fly.toml app configuration file generated for flowfuel-api on 2026-06-18T11:58:36-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'flowfuel-api'
primary_region = 'gru'

[build]

[env]
  PORT = '10000'
  SPRING_PROFILES_ACTIVE = 'prod'
  SWAGGER_ENABLED = 'false'

[http_service]
  internal_port = 10000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '2m0s'
    method = 'GET'
    path = '/actuator/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
